
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUNRISE REALTY | DASHBOARD</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/f59e0b/ffffff?text=SR">
    <meta name="theme-color" content="#020617">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap');
        
        body { 
            font-family: 'Lexend', sans-serif; 
            background-color: #020617;
            color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.08) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.08) 0, transparent 50%);
        }

        .gold-glow { color: #f59e0b; text-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
        
        .bharat-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .action-btn-wa {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            box-shadow: 0 8px 20px -6px rgba(37, 211, 102, 0.4);
        }

        .action-btn-call {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 8px 20px -6px rgba(245, 158, 11, 0.4);
        }

        .nav-font { font-family: 'Space Grotesk', sans-serif; }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
        .pulse-btn { animation: pulse-gold 2s infinite; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="p-6 sticky top-0 z-50 bg-slate-950/80 backdrop-blur-md flex justify-between items-center border-b border-white/5">
        <div>
            <h1 class="nav-font text-2xl font-extrabold tracking-tighter italic">SUNRISE<span class="gold-glow text-orange-500">REALTY</span></h1>
            <div class="flex items-center gap-2 mt-0.5">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <p id="sync-status" class="text-[9px] font-bold text-slate-400 tracking-[0.2em] uppercase">Initialising Sync...</p>
            </div>
        </div>
        <button onclick="fetchData()" id="refresh-btn" class="p-3 bharat-card border-orange-500/20 active:scale-90 transition-all">
            <i data-lucide="refresh-cw" class="w-5 h-5 text-orange-500"></i>
        </button>
    </nav>

    <main class="container mx-auto px-4 py-8 space-y-8">
        
        <div class="relative max-w-2xl mx-auto">
            <input type="text" id="searchInput" onkeyup="filterContent()" placeholder="Search Employee or Client Name..." 
                   class="w-full px-6 py-4 rounded-2xl bg-slate-900/50 border border-white/10 outline-none text-sm focus:border-orange-500 transition-all text-white placeholder:text-slate-500">
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bharat-card p-6 border-l-4 border-orange-500">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Total Calls</p>
                <h2 id="stat-calls" class="text-3xl font-extrabold mt-1 text-white">0</h2>
            </div>
            <div class="bharat-card p-6 border-l-4 border-white">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Site Visits</p>
                <h2 id="stat-visits" class="text-3xl font-extrabold mt-1 text-white font-mono">0</h2>
            </div>
            <div class="bharat-card p-6 border-l-4 border-emerald-500">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Bookings</p>
                <h2 id="stat-bookings" class="text-3xl font-extrabold mt-1 text-emerald-400">0</h2>
            </div>
            <div class="bharat-card p-6 bg-orange-500/10 border-none">
                <p class="text-orange-500 text-[10px] font-bold uppercase tracking-widest">Hot Leads</p>
                <h2 id="stat-positives" class="text-3xl font-extrabold mt-1 text-white">0</h2>
            </div>
        </div>

        <section class="space-y-4">
            <div class="flex items-center gap-2 px-2">
                <i data-lucide="users" class="w-4 h-4 text-orange-500"></i>
                <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400">Team Tracker</h3>
            </div>
            <div class="bharat-card overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 border-b border-white/5">
                        <tr class="text-[10px] uppercase text-orange-500 font-black tracking-widest">
                            <th class="p-5">Agent</th>
                            <th class="p-5 text-center">Calls</th>
                            <th class="p-5 text-center">Visits</th>
                            <th class="p-5 text-center">Books</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </section>

        <section class="space-y-6 pb-20">
            <div class="flex items-center gap-2 px-2">
                <i data-lucide="flame" class="w-4 h-4 text-orange-500"></i>
                <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400">Positive Client Feed</h3>
            </div>
            <div id="leads-container" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3"></div>
        </section>

    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzhpY11MqK6m1-g7GYeu5Zac8ygY4mHiFqRMqM5q6onMVprobGRxficaShOVPHOavh0/exec";

        async function fetchData() {
            const btn = document.getElementById('refresh-btn');
            const status = document.getElementById('sync-status');
            btn.classList.add('animate-spin');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderUI(data);
                
                const now = new Date();
                status.innerText = "Updated: " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
            } catch (err) {
                console.error("Link Error");
                status.innerText = "Sync Failed";
            } finally {
                btn.classList.remove('animate-spin');
            }
        }

        // --- AUTO REFRESH LOGIC ---
        // Refresh every 5 minutes (300,000 milliseconds)
        setInterval(fetchData, 300000);

        function renderUI(data) {
            let calls = 0, visits = 0, books = 0;
            const tableBody = document.getElementById('table-body');
            const currentSearch = document.getElementById('searchInput').value.toLowerCase();
            tableBody.innerHTML = '';
            
            data.dailyTracking.forEach(row => {
                const c = parseInt(row.Total_Calls__) || 0;
                const v = parseInt(row.Visits__) || 0;
                const b = parseInt(row.Bookings__) || 0;
                calls += c; visits += v; books += b;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/5 transition-all";
                if (currentSearch && !row.Employee_Name.toLowerCase().includes(currentSearch)) {
                    tr.style.display = 'none';
                }
                tr.innerHTML = `
                    <td class="p-5 font-bold text-white uppercase text-[10px] tracking-wider">${row.Employee_Name}</td>
                    <td class="p-5 text-center font-bold text-white/60">${c}</td>
                    <td class="p-5 text-center font-bold text-white/60">${v}</td>
                    <td class="p-5 text-center font-bold text-emerald-400">${b}</td>
                `;
                tableBody.appendChild(tr);
            });

            document.getElementById('stat-calls').innerText = calls.toLocaleString();
            document.getElementById('stat-visits').innerText = visits;
            document.getElementById('stat-bookings').innerText = books;
            document.getElementById('stat-positives').innerText = data.positiveLeads.length;

            const leadsContainer = document.getElementById('leads-container');
            leadsContainer.innerHTML = '';

            data.positiveLeads.reverse().forEach(lead => {
                const phone = (lead.Client_Contact_No_ || "").toString().replace(/\D/g, '');
                const card = document.createElement('div');
                card.className = "bharat-card p-8 flex flex-col justify-between group border-l-4 border-emerald-500/30";
                
                if (currentSearch && !lead.Client_Name.toLowerCase().includes(currentSearch) && !lead.Employee_Name.toLowerCase().includes(currentSearch)) {
                    card.style.display = 'none';
                }

                card.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-start">
                            <h4 class="font-extrabold text-white text-base uppercase tracking-tight">${lead.Client_Name}</h4>
                            <span class="bg-emerald-500/20 text-emerald-400 text-[8px] font-black px-2 py-1 rounded tracking-widest uppercase">Positive</span>
                        </div>
                        <p class="text-[9px] font-bold text-orange-500 uppercase tracking-widest">Agent: ${lead.Employee_Name}</p>
                        <div class="p-4 bg-slate-950/50 rounded-xl border border-white/5 italic text-sm text-slate-300">
                            "${lead.Feedback}"
                        </div>
                    </div>
                    <div class="flex gap-4 mt-8">
                        <a href="tel:${phone}" class="flex-1 action-btn-call text-white text-[10px] font-black py-4 rounded-xl flex items-center justify-center gap-2 uppercase tracking-widest active:scale-95 transition-all">
                            <i data-lucide="phone" class="w-3.5 h-3.5"></i> Call
                        </a>
                        <a href="https://wa.me/91${phone}" target="_blank" class="flex-1 action-btn-wa text-white text-[10px] font-black py-4 rounded-xl flex items-center justify-center gap-2 uppercase tracking-widest active:scale-95 transition-all">
                            <i data-lucide="message-circle" class="w-3.5 h-3.5"></i> WhatsApp
                        </a>
                    </div>`;
                leadsContainer.appendChild(card);
            });
            lucide.createIcons();
        }

        function filterContent() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('#table-body tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none');
            document.querySelectorAll('#leads-container > div').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? '' : 'none');
        }

        window.onload = fetchData;
        // --- SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered!'))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
    </script>
</body>
</html>
