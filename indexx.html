<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUNRISE REALTY | PRO DASHBOARD</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png" sizes="32x32">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap');
        
        /* 1. THE CRITICAL FIX: Lock the width of the entire app */
        html, body { 
            max-width: 100vw; 
            overflow-x: hidden; 
            position: relative;
            background-color: #020617;
            color: #f8fafc;
        }

        body { font-family: 'Lexend', sans-serif; background-image: radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.15) 0, transparent 50%); }
        .gold-glow { color: #f59e0b; text-shadow: 0 0 15px rgba(245, 158, 11, 0.5); }
        .nav-font { font-family: 'Space Grotesk', sans-serif; }
        
        /* 2. CARD FIX: Prevent cards from ever expanding the screen */
        .bharat-card { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 24px;
            max-width: 100%;
            overflow: hidden;
            box-sizing: border-box;
        }

        .filter-btn { padding: 10px 18px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.05); color: #94a3b8; transition: all 0.3s; white-space: nowrap; }
        .filter-btn.active { background: #f59e0b; color: white; border-color: #f59e0b; box-shadow: 0 8px 20px -5px rgba(245, 158, 11, 0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="login-screen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6">
        <div class="bharat-card p-10 w-full max-w-md space-y-8 text-center border-orange-500/20">
            <h1 class="nav-font text-4xl font-extrabold italic uppercase tracking-tighter">SUNRISE<span class="gold-glow text-orange-500">REALTY</span></h1>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full px-6 py-4 rounded-2xl bg-slate-900 border border-white/10 text-white outline-none focus:border-orange-500">
                <input type="password" id="password" placeholder="Password" class="w-full px-6 py-4 rounded-2xl bg-slate-900 border border-white/10 text-white outline-none focus:border-orange-500">
                <button onclick="handleLogin()" id="login-btn" class="w-full bg-orange-500 py-4 rounded-2xl text-white font-black uppercase tracking-widest shadow-lg shadow-orange-500/20">Access Dashboard</button>
                <p id="login-error" class="text-red-500 text-xs font-bold uppercase hidden">Verification Failed</p>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <nav class="p-6 sticky top-0 z-50 bg-slate-950/90 backdrop-blur-lg flex justify-between items-center border-b border-white/5">
            <div>
                <h1 class="nav-font text-2xl font-extrabold italic uppercase tracking-tighter">SUNRISE<span class="gold-glow text-orange-500">REALTY</span></h1>
                <div class="flex items-center gap-2 mt-0.5">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <p id="sync-status" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">System Live</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="logout()" class="p-3 bharat-card border-white/10 active:scale-90"><i data-lucide="log-out" class="w-5 h-5 text-slate-400"></i></button>
                <button onclick="fetchData()" id="refresh-btn" class="p-3 bharat-card border-orange-500/20 active:scale-90"><i data-lucide="refresh-cw" class="w-5 h-5 text-orange-500"></i></button>
            </div>
        </nav>

        <main class="container mx-auto px-4 py-8 space-y-8 max-w-full overflow-x-hidden">
            <div class="space-y-4">
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                    <button onclick="setTimeFilter('today')" id="filter-today" class="filter-btn active">Today</button>
                    <button onclick="setTimeFilter('yesterday')" id="filter-yesterday" class="filter-btn">Yesterday</button>
                    <button onclick="setTimeFilter('week')" id="filter-week" class="filter-btn">Week</button>
                    <button onclick="setTimeFilter('month')" id="filter-month" class="filter-btn">Month</button>
                    <button onclick="setTimeFilter('year')" id="filter-year" class="filter-btn">Year</button>
                    <button onclick="toggleCustomRange()" id="filter-custom-trigger" class="filter-btn border-orange-500/30 text-orange-500">Range +</button>
                    <button onclick="setTimeFilter('all')" id="filter-all" class="filter-btn">All</button>
                </div>
                <div id="custom-range-panel" class="hidden animate-fade-in bg-slate-900/90 p-5 rounded-3xl border border-orange-500/20 space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="date" id="dateFrom" onchange="setTimeFilter('range')" class="w-full bg-slate-950 border border-white/10 rounded-2xl px-4 py-3 text-xs text-white">
                        <input type="date" id="dateTo" onchange="setTimeFilter('range')" class="w-full bg-slate-950 border border-white/10 rounded-2xl px-4 py-3 text-xs text-white">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bharat-card p-5 border-l-4 border-orange-500"><p class="text-[9px] font-bold text-slate-500 uppercase">Calls</p><h2 id="stat-calls" class="text-2xl font-black text-white">0</h2></div>
                <div class="bharat-card p-5 border-l-4 border-white"><p class="text-[9px] font-bold text-slate-500 uppercase">Visits</p><h2 id="stat-visits" class="text-2xl font-black text-white">0</h2></div>
                <div class="bharat-card p-5 border-l-4 border-emerald-500"><p class="text-[9px] font-bold text-slate-500 uppercase">Books</p><h2 id="stat-bookings" class="text-2xl font-black text-emerald-400">0</h2></div>
                <div class="bharat-card p-5 bg-orange-500/10 border-none"><p class="text-[9px] font-bold text-orange-500 uppercase">Positive</p><h2 id="stat-positives" class="text-2xl font-black text-white">0</h2></div>
            </div>

            <div class="relative">
                <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                <input type="text" id="searchInput" onkeyup="renderUI()" placeholder="Search Agent or Client..." class="w-full pl-14 pr-6 py-4 rounded-2xl bg-slate-900 border border-white/10 text-white outline-none focus:border-orange-500">
            </div>

            <section id="admin-section" class="space-y-4">
                <div class="flex items-center gap-2 px-2"><i data-lucide="users-2" class="w-4 h-4 text-orange-500"></i><h3 class="text-[10px] font-bold uppercase text-slate-400 tracking-widest">Team Performance</h3></div>
                <div class="bharat-card overflow-hidden w-full overflow-x-auto">
                    <table class="w-full text-left min-w-[300px]">
                        <thead class="bg-white/5 border-b border-white/5 text-[9px] uppercase text-orange-500 font-black">
                            <tr><th class="p-4">Agent</th><th class="p-4 text-center">Calls</th><th class="p-4 text-center">Visits</th><th class="p-4 text-center">Books</th></tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </section>

            <section class="space-y-6 pb-20">
                <div class="flex items-center gap-2 px-2"><i data-lucide="award" class="w-4 h-4 text-orange-500"></i><h3 class="text-[10px] font-bold uppercase text-slate-400 tracking-widest">Success Feed</h3></div>
                <div id="leads-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full"></div>
            </section>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzdJnb91GFQ9T9fbU5zwqiFecUSsUDe7Ye59uGbCj0iP4RLOcyegnCwtIWow_h4qNwa/exec";
        let globalData = null;
        let currentTimeFilter = 'today';

        async function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if(!user || !pass) return;
            document.getElementById('login-btn').innerText = "Verifying...";
            try {
                const response = await fetch(`${API_URL}?action=login&user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`);
                const result = await response.json();
                if (result.success) {
                    localStorage.setItem('sr_auth', 'true');
                    localStorage.setItem('sr_user', user);
                    localStorage.setItem('sr_role', result.role);
                    showDashboard();
                } else { document.getElementById('login-error').classList.remove('hidden'); document.getElementById('login-btn').innerText = "Access Dashboard"; }
            } catch (err) { alert("Network error."); }
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            if(localStorage.getItem('sr_role') === "Agent") document.getElementById('admin-section').classList.add('hidden');
            fetchData();
        }

        async function fetchData() {
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('animate-spin');
            try {
                const response = await fetch(API_URL);
                globalData = await response.json();
                renderUI();
                document.getElementById('sync-status').innerText = "Sync: " + new Date().toLocaleTimeString();
            } catch (err) { document.getElementById('sync-status').innerText = "Sync Failed"; }
            finally { btn.classList.remove('animate-spin'); lucide.createIcons(); }
        }

        function toggleCustomRange() { document.getElementById('custom-range-panel').classList.toggle('hidden'); lucide.createIcons(); }

        function setTimeFilter(f) { 
            currentTimeFilter = f; 
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if(f !== 'range') document.getElementById(`filter-${f}`).classList.add('active');
            renderUI(); 
        }

        function isWithinTimeRange(dateStr) {
            if (currentTimeFilter === 'all') return true;
            if (!dateStr) return false;
            const rowDate = new Date(dateStr); rowDate.setHours(0,0,0,0);
            const now = new Date(); now.setHours(0,0,0,0);
            if (currentTimeFilter === 'today') return rowDate.getTime() === now.getTime();
            if (currentTimeFilter === 'yesterday') { const y = new Date(now); y.setDate(now.getDate()-1); return rowDate.getTime() === y.getTime(); }
            if (currentTimeFilter === 'week') { const s = new Date(now); s.setDate(now.getDate() - now.getDay()); return rowDate >= s; }
            if (currentTimeFilter === 'month') return rowDate.getMonth() === now.getMonth() && rowDate.getFullYear() === now.getFullYear();
            if (currentTimeFilter === 'year') return rowDate.getFullYear() === now.getFullYear();
            if (currentTimeFilter === 'range') {
                const f = document.getElementById('dateFrom').value; const t = document.getElementById('dateTo').value;
                if(!f || !t) return true;
                const sd = new Date(f); sd.setHours(0,0,0,0); const ed = new Date(t); ed.setHours(0,0,0,0);
                return rowDate >= sd && rowDate <= ed;
            }
            return true;
        }

        function renderUI() {
            if(!globalData) return;
            const role = localStorage.getItem('sr_role');
            const currentUser = (localStorage.getItem('sr_user') || "").toLowerCase();
            const search = document.getElementById('searchInput').value.toLowerCase();
            const tableBody = document.getElementById('table-body');
            const leadsContainer = document.getElementById('leads-container');
            
            let tCalls = 0, tVisits = 0, tBooks = 0, tPositives = 0;
            const performanceMap = {}; 
            tableBody.innerHTML = ''; leadsContainer.innerHTML = '';

            // Grouping Logic
            globalData.dailyTracking.forEach(row => {
                const name = (row.Employee_Name || "").trim();
                if(!name) return;
                if (isWithinTimeRange(row.Timestamp || row.Date)) {
                    const c = parseInt(row.Total_Calls__) || 0;
                    const v = parseInt(row.Visits__) || 0;
                    const b = parseInt(row.Bookings__) || 0;
                    const isMe = name.toLowerCase().includes(currentUser);
                    if (role === "Admin" || isMe) {
                        tCalls += c; tVisits += v; tBooks += b;
                        if (!performanceMap[name]) performanceMap[name] = {c:0,v:0,b:0};
                        performanceMap[name].c += c; performanceMap[name].v += v; performanceMap[name].b += b;
                    }
                }
            });

            // Table Body
            Object.keys(performanceMap).sort().forEach(agent => {
                if(!search || agent.toLowerCase().includes(search)) {
                    const d = performanceMap[agent];
                    tableBody.innerHTML += `<tr class="border-b border-white/5 text-[10px] font-bold uppercase transition-colors hover:bg-white/5"><td class="p-4">${agent}</td><td class="p-4 text-center">${d.c}</td><td class="p-4 text-center">${d.v}</td><td class="p-4 text-center text-emerald-400 font-black">${d.b}</td></tr>`;
                }
            });

            // Feed Cards (NO OVERFLOW VERSION)
            globalData.positiveLeads.reverse().forEach(l => {
                const agent = (l.Employee_Name || "").toLowerCase();
                const client = (l.Client_Name || "").toLowerCase();
                if (isWithinTimeRange(l.Timestamp || l.Date) && (role === "Admin" || agent.includes(currentUser)) && (!search || agent.includes(search) || client.includes(search))) {
                    tPositives++;
                    const phRaw = (l.Client_Contact_No_ || "").toString().replace(/\D/g, '');
                    const phWA = phRaw.length === 10 ? '91' + phRaw : phRaw;
                    leadsContainer.innerHTML += `
                        <div class="bharat-card p-6 flex flex-col justify-between border-l-4 border-emerald-500/40 animate-fade-in w-full box-border">
                            <div class="space-y-4">
                                <div class="flex justify-between items-start gap-2 overflow-hidden">
                                    <div class="min-w-0 flex-1">
                                        <h4 class="font-extrabold text-white text-sm uppercase truncate">${l.Client_Name}</h4>
                                        <p class="text-[8px] font-bold text-orange-500 uppercase mt-1 truncate">Agent: ${l.Employee_Name}</p>
                                    </div>
                                    <span class="bg-emerald-500/10 text-emerald-400 text-[8px] font-black px-2 py-1 rounded-md border border-emerald-500/20 flex-shrink-0">SUCCESS</span>
                                </div>
                                <div class="p-3 bg-slate-950/50 rounded-xl italic text-xs text-slate-300 border border-white/5 break-words">
                                    "${l.Feedback}"
                                </div>
                                <p class="text-[8px] text-slate-500 uppercase font-bold tracking-widest">${l.Timestamp || l.Date}</p>
                            </div>
                            <div class="flex gap-3 mt-6">
                                <a href="tel:${phRaw}" class="flex-1 bg-orange-500 text-center py-3 rounded-xl text-[10px] font-black uppercase transition-all active:scale-95 shadow-lg shadow-orange-500/20">Call</a>
                                <a href="https://wa.me/${phWA}" target="_blank" class="flex-1 bg-emerald-600 text-center py-3 rounded-xl text-[10px] font-black uppercase transition-all active:scale-95">WhatsApp</a>
                            </div>
                        </div>`;
                }
            });

            document.getElementById('stat-calls').innerText = tCalls.toLocaleString();
            document.getElementById('stat-visits').innerText = tVisits;
            document.getElementById('stat-bookings').innerText = tBooks;
            document.getElementById('stat-positives').innerText = tPositives;
            lucide.createIcons();
        }

        async function logout() { localStorage.clear(); location.reload(); }
        window.onload = () => { if (localStorage.getItem('sr_auth') === 'true') showDashboard(); lucide.createIcons(); };
    </script>
    <script>
    // Register the Service Worker (sw.js)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker Registered!', reg))
          .catch(err => console.log('Service Worker failed:', err));
      });
    }
  </script>
</body>
</html>
